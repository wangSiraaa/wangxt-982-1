version: '3.8'

services:
  meeting-room-system:
    build: .
    container_name: meeting-room-system
    ports:
      - "5173:5173"
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=http://localhost:3001
      - PORT=3001
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    restart: unless-stopped
    networks:
      - meeting-network

networks:
  meeting-network:
    driver: bridge
